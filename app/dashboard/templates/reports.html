{% set title = "Reports" %}

{% extends "base.html" %}

{% block content %}

<h1>📄 Reports</h1>

<div class="card">

    <table>

        <tr>

            <th>Topic</th>

            <th>Date</th>

            <th>Opportunity</th>

        </tr>

        {% for report in reports %}

        <tr>

            <td>

                <a href="/topic/{{ report[1]|trim|urlencode }}">
                    {{ report[1]|trim }}
                </a>

            </td>

            <td>{{ report[2] }}</td>

            <td>{{ report[3] if report[3] is not none else '—' }}</td>

        </tr>

        {% endfor %}

    </table>

</div>

{% endblock %}
