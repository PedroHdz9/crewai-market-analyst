<!DOCTYPE html>
<html>

<head>

    <title>{{ report[1] }}</title>

    <link
        rel="stylesheet"
        href="/static/style.css?v=2">

</head>

<body>

<div class="container">

    <div class="header">

        <h1>{{ report[1] }}</h1>

        <p>{{ report[2] }}</p>

    </div>

    <div class="card">

        <a href="/download/pdf/{{ report[0] }}">
            Descargar PDF
        </a>

        <br><br>

        <a href="/download/md/{{ report[0] }}">
            Descargar Markdown
        </a>

    </div>

    <div class="report-content">

        {{ content | safe }}

    </div>

</div>

</body>

</html>
